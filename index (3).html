<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade 9 Science Revision Checklist</title>
  <meta name="description" content="Depth-tiered Grade 9 Science revision checklist — Genetics, Evolution, Waves, Chemistry. Progress saves automatically." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700&display=swap" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { background: #FAF6F0; scroll-behavior: smooth; }
    body { font-family: 'Inter Tight', sans-serif; -webkit-font-smoothing: antialiased; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo } = React;

    // ─── Icons (inline SVG so no external icon lib needed) ──────────────────
    const Check = ({ className, strokeWidth = 2 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="20 6 9 17 4 12" />
      </svg>
    );
    const AlertTriangle = ({ className, strokeWidth = 2 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
        <path d="M12 9v4" />
        <path d="M12 17h.01" />
      </svg>
    );
    const RotateCcw = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
        <path d="M3 3v5h5" />
      </svg>
    );
    const BookOpen = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
      </svg>
    );
    const Target = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10" />
        <circle cx="12" cy="12" r="6" />
        <circle cx="12" cy="12" r="2" />
      </svg>
    );
    const Zap = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z" />
      </svg>
    );
    const Filter = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
      </svg>
    );

    // ─── Config ─────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'g9-sci-revision-v1';

    const TIER_INFO = {
      know:    { label: 'KNOW',    desc: 'Recall, define, state',                Icon: BookOpen, bg: 'bg-stone-100', text: 'text-stone-700', border: 'border-stone-300' },
      apply:   { label: 'APPLY',   desc: 'Use it in a problem',                  Icon: Target,   bg: 'bg-amber-50',  text: 'text-amber-800', border: 'border-amber-300' },
      stretch: { label: 'STRETCH', desc: 'Analyze, unfamiliar, exam traps',      Icon: Zap,      bg: 'bg-rose-50',   text: 'text-rose-800',  border: 'border-rose-300'  },
    };

    const TOPICS = [
      {
        id: 'genetics',
        name: 'Genetics & Inheritance',
        accent: { ink: '#3F5B41', tint: '#EBF1EB' },
        sections: [
          {
            name: 'Vocabulary & Foundations',
            note: 'Get terms airtight — examiners use them precisely, so should you.',
            items: [
              { tier: 'know',  text: 'Define: gene, allele, chromosome, DNA, locus, gamete, zygote, mutation' },
              { tier: 'know',  text: 'Distinguish homozygous vs heterozygous; diploid vs haploid' },
              { tier: 'know',  text: 'Describe DNA structure: double helix, nucleotides, base pairs (A–T, C–G)' },
              { tier: 'apply', text: 'Explain the hierarchy: DNA → gene → chromosome → nucleus → cell' },
            ],
          },
          {
            name: 'Genotype, Phenotype & Punnett Squares',
            note: 'Most marks are lost by writing ratios without explaining what they mean.',
            items: [
              { tier: 'know',    text: 'Define genotype vs phenotype, with 2 worked examples' },
              { tier: 'know',    text: 'Use correct allele notation (e.g. BB, Bb, bb) for dominant/recessive' },
              { tier: 'apply',   text: 'Complete a monohybrid Punnett square from given parent genotypes' },
              { tier: 'apply',   text: 'Predict phenotype AND genotype ratios from a cross (e.g. 3:1, 1:2:1)' },
              { tier: 'apply',   text: 'Work BACKWARDS: given offspring ratios, determine parent genotypes' },
              { tier: 'stretch', text: 'Solve a test-cross problem to find an unknown dominant genotype' },
              { tier: 'stretch', text: 'Express inheritance probability as a fraction AND % (e.g. 1/4 = 25%)' },
            ],
          },
          {
            name: 'Sex-Linked Inheritance',
            note: 'Use Xᴮ / Xᵇ / Y notation — not B/b — or you lose easy marks.',
            items: [
              { tier: 'know',    text: 'Explain XY sex determination in humans' },
              { tier: 'apply',   text: 'Set up a Punnett square using sex-linked alleles (Xᴮ, Xᵇ, Y)' },
              { tier: 'apply',   text: 'Explain WHY X-linked recessive disorders affect males more than females' },
              { tier: 'stretch', text: 'Predict offspring outcomes for haemophilia or colour blindness from a carrier mother' },
            ],
          },
          {
            name: 'Inherited Disorders & Pedigrees',
            note: 'Pedigrees are the #1 application question — practice reading them cold.',
            items: [
              { tier: 'know',    text: "Name examples: recessive (cystic fibrosis, sickle cell), dominant (Huntington's)" },
              { tier: 'apply',   text: 'Read a pedigree: identify affected, unaffected, carriers, and generations' },
              { tier: 'stretch', text: 'Determine inheritance pattern (autosomal recessive/dominant or X-linked) from a pedigree' },
            ],
          },
          {
            name: 'Variation',
            note: '"Variation occurs" is not an answer — name the SOURCE.',
            items: [
              { tier: 'know',  text: 'Distinguish continuous (height) vs discontinuous (blood type) variation with examples' },
              { tier: 'know',  text: 'Distinguish genetic vs environmental causes of variation' },
              { tier: 'apply', text: 'Explain genetic sources: meiosis (independent assortment, crossing over), random fertilisation, mutation' },
            ],
          },
        ],
      },
      {
        id: 'evolution',
        name: 'Evolution & Adaptation',
        accent: { ink: '#9A4B2C', tint: '#F5E6DE' },
        sections: [
          {
            name: 'Natural Selection',
            note: 'Top-mark answers walk through the FULL chain, not just "survival of the fittest".',
            items: [
              { tier: 'know',    text: 'State the 5 conditions: variation → overproduction → competition → selection → inheritance' },
              { tier: 'apply',   text: 'Walk through natural selection step-by-step for a named example (peppered moth OR antibiotic resistance)' },
              { tier: 'stretch', text: "Apply natural selection logic to an UNFAMILIAR scenario you've never seen before" },
              { tier: 'stretch', text: "Correct the misconception: organisms don't \"choose\" to adapt — variation is random, selection is not" },
            ],
          },
          {
            name: 'Adaptations',
            note: 'For each example, you need: organism + adaptation + how it helps survive/reproduce.',
            items: [
              { tier: 'know',    text: 'Classify adaptations as structural, behavioural, or physiological' },
              { tier: 'apply',   text: 'Give 2+ examples for each adaptation type with the organism AND function' },
              { tier: 'apply',   text: 'Explain how a trait increases survival AND reproduction (both, not just survival)' },
              { tier: 'stretch', text: 'Distinguish adaptation (population, over generations) from acclimatisation (individual, lifetime)' },
            ],
          },
          {
            name: 'Evidence & Selection Pressures',
            note: 'Evolution data questions = identify the pressure + predict the trend.',
            items: [
              { tier: 'apply',   text: 'List 4+ forms of evidence for evolution: fossils, homologous structures, DNA similarity, vestigial structures' },
              { tier: 'apply',   text: 'Identify selection pressures in a scenario: predation, climate, food/mate competition' },
              { tier: 'stretch', text: 'Interpret a graph showing allele frequency or trait distribution changing over generations' },
            ],
          },
        ],
      },
      {
        id: 'waves',
        name: 'Waves',
        accent: { ink: '#2C4A6A', tint: '#DEE8F2' },
        sections: [
          {
            name: 'Wave Properties',
            note: 'Define each term WITH its unit — missing units is the easiest mark to lose.',
            items: [
              { tier: 'know',  text: 'Define wavelength λ (m), amplitude (m), frequency f (Hz), period T (s), wave speed v (m/s)' },
              { tier: 'know',  text: 'Distinguish transverse (light, water) vs longitudinal (sound) waves' },
              { tier: 'apply', text: 'Label crest, trough, compression, rarefaction on diagrams of both wave types' },
              { tier: 'apply', text: 'Explain how waves transfer ENERGY without transferring MATTER' },
            ],
          },
          {
            name: 'Wave Calculations',
            note: 'Rearranging the wave equation is non-negotiable.',
            items: [
              { tier: 'know',    text: 'State v = f × λ and f = 1 / T' },
              { tier: 'apply',   text: 'Calculate v, f, or λ given the other two (with unit conversions: kHz, MHz, mm, km)' },
              { tier: 'apply',   text: 'Read frequency and amplitude directly from a wave diagram' },
              { tier: 'stretch', text: 'Explain the inverse relationship: at constant v, higher f ⇒ shorter λ' },
            ],
          },
          {
            name: 'Wave Behaviour & EM Spectrum',
            note: 'Memorize the order AND one use per region.',
            items: [
              { tier: 'apply',   text: 'Order EM spectrum: radio → micro → IR → visible → UV → X-ray → gamma' },
              { tier: 'apply',   text: 'Match each EM region to one use (e.g. microwaves → cooking/communication, X-rays → medical imaging)' },
              { tier: 'stretch', text: 'Describe reflection, refraction, and diffraction in one clear sentence each' },
            ],
          },
        ],
      },
      {
        id: 'chemistry',
        name: 'Chemistry — Ionic Bonding & Equations',
        accent: { ink: '#7A5A1F', tint: '#F2EAD6' },
        sections: [
          {
            name: 'Atomic Structure (Foundations)',
            note: 'Ionic bonding makes no sense without electron configurations — review these first.',
            items: [
              { tier: 'know',  text: 'Identify proton, neutron, electron: charge, mass, location' },
              { tier: 'know',  text: 'Use atomic number and mass number to find p, n, e counts' },
              { tier: 'apply', text: 'Write electron configuration (2,8,8) for elements 1–20' },
              { tier: 'apply', text: 'State the octet rule: atoms gain/lose electrons to fill outer shell' },
            ],
          },
          {
            name: 'Ion Formation',
            note: "Group # → predicts charge. Drill this until it's reflex.",
            items: [
              { tier: 'know',    text: 'Identify groups that form cations (1, 2, 3) and anions (5, 6, 7), with their charges' },
              { tier: 'know',    text: 'Explain WHY metals lose electrons and non-metals gain them (stability / noble gas config)' },
              { tier: 'apply',   text: 'Predict the ion formed by any main-group element (e.g. Mg → Mg²⁺, O → O²⁻)' },
              { tier: 'apply',   text: 'Recognise common polyatomic ions: NH₄⁺, OH⁻, NO₃⁻, SO₄²⁻, CO₃²⁻' },
              { tier: 'stretch', text: 'Draw dot-cross diagrams showing electron transfer (e.g. NaCl, MgO, CaCl₂)' },
            ],
          },
          {
            name: 'Ionic Compounds',
            note: 'Charges MUST balance to zero — this is where formula errors come from.',
            items: [
              { tier: 'apply',   text: 'Write ionic compound formulas by balancing charges (crisscross method)' },
              { tier: 'apply',   text: 'Name ionic compounds: cation first, anion as -ide (or polyatomic name)' },
              { tier: 'stretch', text: 'Explain ionic properties (high MP, conducts when molten/aqueous but not solid, brittle, crystalline) — and LINK each property back to lattice structure' },
            ],
          },
          {
            name: 'Chemical Equations',
            note: 'Balancing = change coefficients, NEVER subscripts. State symbols matter.',
            items: [
              { tier: 'know',    text: 'Identify reactants vs products; explain what the → arrow means' },
              { tier: 'know',    text: 'Read formulas correctly: subscripts (atoms in a molecule) vs coefficients (molecule count)' },
              { tier: 'apply',   text: 'Use state symbols correctly: (s), (l), (g), (aq)' },
              { tier: 'apply',   text: 'Balance equations by adjusting coefficients only' },
              { tier: 'apply',   text: 'Recognise reaction types: combination, decomposition, displacement, combustion, neutralisation' },
              { tier: 'stretch', text: 'Balance multi-step equations involving polyatomic ions (e.g. Al + CuSO₄ → ...)' },
            ],
          },
        ],
      },
    ];

    // click order: todo → shaky → done → todo
    const cycleState = (s) => (s === 'done' ? 'todo' : s === 'shaky' ? 'done' : 'shaky');

    // ─── Main App ───────────────────────────────────────────────────────────
    function RevisionChecklist() {
      const [status, setStatus] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : {};
        } catch (e) { return {}; }
      });
      const [filter, setFilter] = useState('all');
      const [resetConfirm, setResetConfirm] = useState(null);
      const [activeTopic, setActiveTopic] = useState(TOPICS[0].id);

      useEffect(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(status)); } catch (e) {}
      }, [status]);

      // Track which topic is currently in view
      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            // Pick the topmost intersecting section
            const visible = entries
              .filter((e) => e.isIntersecting)
              .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
            if (visible[0]) setActiveTopic(visible[0].target.id);
          },
          { rootMargin: '-20% 0px -65% 0px', threshold: 0 }
        );
        TOPICS.forEach((t) => {
          const el = document.getElementById(t.id);
          if (el) observer.observe(el);
        });
        return () => observer.disconnect();
      }, []);

      const scrollToTopic = (topicId) => {
        const el = document.getElementById(topicId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const toggle = (key) => {
        setStatus((prev) => {
          const current = prev[key] || 'todo';
          const next = cycleState(current);
          const updated = { ...prev };
          if (next === 'todo') delete updated[key];
          else updated[key] = next;
          return updated;
        });
      };

      const resetTopic = (topicId) => {
        setStatus((prev) => {
          const updated = { ...prev };
          Object.keys(updated).forEach((k) => {
            if (k.startsWith(topicId + ':')) delete updated[k];
          });
          return updated;
        });
        setResetConfirm(null);
      };

      const resetAll = () => {
        setStatus({});
        setResetConfirm(null);
      };

      const stats = useMemo(() => {
        const all = TOPICS.flatMap((t) =>
          t.sections.flatMap((s, si) =>
            s.items.map((it, ii) => ({ ...it, key: `${t.id}:${si}:${ii}`, topicId: t.id }))
          )
        );
        const counts = { total: all.length, done: 0, shaky: 0, todo: 0 };
        const byTopic = {};
        TOPICS.forEach((t) => (byTopic[t.id] = { total: 0, done: 0, shaky: 0, todo: 0 }));
        all.forEach((it) => {
          const s = status[it.key] || 'todo';
          counts[s]++;
          byTopic[it.topicId].total++;
          byTopic[it.topicId][s]++;
        });
        return { counts, byTopic, all };
      }, [status]);

      const pct = stats.counts.total > 0 ? Math.round((stats.counts.done / stats.counts.total) * 100) : 0;

      return (
        <div
          className="min-h-screen pb-32"
          style={{
            fontFamily: "'Inter Tight', sans-serif",
            backgroundColor: '#FAF6F0',
            color: '#1A1814',
            backgroundImage:
              'radial-gradient(circle at 20% 0%, rgba(154, 75, 44, 0.04) 0%, transparent 50%), radial-gradient(circle at 80% 100%, rgba(63, 91, 65, 0.04) 0%, transparent 50%)',
          }}
        >
          {/* DESKTOP SIDEBAR (xl+ screens) */}
          <aside
            className="hidden xl:block fixed top-12 z-10"
            style={{ left: 'max(2rem, calc((100vw - 48rem) / 2 - 16rem))', width: '14rem' }}
          >
            <div className="text-[10px] tracking-[0.3em] uppercase text-stone-400 font-semibold mb-4">
              Topics
            </div>
            <nav className="space-y-1">
              {TOPICS.map((topic) => {
                const tStats = stats.byTopic[topic.id];
                const tPct = tStats.total > 0 ? Math.round((tStats.done / tStats.total) * 100) : 0;
                const isActive = activeTopic === topic.id;
                return (
                  <button
                    key={topic.id}
                    onClick={() => scrollToTopic(topic.id)}
                    className={`w-full text-left px-3 py-2.5 rounded-lg transition group ${
                      isActive ? 'bg-white shadow-sm' : 'hover:bg-white/60'
                    }`}
                  >
                    <div className="flex items-center gap-2 mb-1.5">
                      <span
                        className="w-1.5 h-1.5 rounded-full shrink-0 transition-all"
                        style={{
                          backgroundColor: topic.accent.ink,
                          opacity: isActive ? 1 : 0.4,
                          transform: isActive ? 'scale(1.4)' : 'scale(1)',
                        }}
                      />
                      <span
                        className={`text-sm leading-tight ${isActive ? 'font-semibold' : 'font-medium text-stone-600 group-hover:text-stone-900'}`}
                        style={isActive ? { color: topic.accent.ink, fontFamily: "'Fraunces', serif" } : {}}
                      >
                        {topic.name.split(' — ')[0]}
                      </span>
                    </div>
                    <div className="relative h-0.5 rounded-full overflow-hidden ml-3.5" style={{ backgroundColor: topic.accent.tint }}>
                      <div
                        className="absolute inset-y-0 left-0 transition-all duration-300"
                        style={{
                          width: `${(tStats.done / tStats.total) * 100}%`,
                          backgroundColor: topic.accent.ink,
                        }}
                      />
                    </div>
                    <div className="text-[10px] text-stone-400 ml-3.5 mt-1 tabular-nums">
                      {tStats.done}/{tStats.total} · {tPct}%
                    </div>
                  </button>
                );
              })}
            </nav>
            <button
              onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
              className="mt-4 ml-3 text-[10px] tracking-wider uppercase text-stone-400 hover:text-stone-700 transition"
            >
              ↑ Back to top
            </button>
          </aside>

          {/* MOBILE PILL NAV (sticky, <xl) */}
          <div className="xl:hidden sticky top-0 z-20 backdrop-blur-md border-b border-stone-200/60" style={{ backgroundColor: 'rgba(250, 246, 240, 0.85)' }}>
            <div className="max-w-3xl mx-auto px-6 py-2.5 flex gap-2 overflow-x-auto scrollbar-hide">
              {TOPICS.map((topic) => {
                const tStats = stats.byTopic[topic.id];
                const isActive = activeTopic === topic.id;
                return (
                  <button
                    key={topic.id}
                    onClick={() => scrollToTopic(topic.id)}
                    className={`shrink-0 px-3 py-1.5 rounded-full text-xs font-medium transition whitespace-nowrap ${
                      isActive ? 'shadow-sm' : 'bg-stone-100 text-stone-600'
                    }`}
                    style={isActive ? { backgroundColor: topic.accent.tint, color: topic.accent.ink } : {}}
                  >
                    <span className="inline-flex items-center gap-1.5">
                      <span
                        className="w-1.5 h-1.5 rounded-full"
                        style={{ backgroundColor: isActive ? topic.accent.ink : '#a8a29e' }}
                      />
                      {topic.name.split(' — ')[0]}
                      <span className="opacity-60 tabular-nums">{tStats.done}/{tStats.total}</span>
                    </span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* HEADER */}
          <header className="max-w-3xl mx-auto px-6 pt-12 pb-8">
            <div className="text-xs tracking-[0.25em] uppercase text-stone-500 mb-3">
              Grade 9 Science · End of Year · Criterion A
            </div>
            <h1
              className="text-5xl md:text-6xl font-black leading-[0.95] mb-4"
              style={{ fontFamily: "'Fraunces', serif", letterSpacing: '-0.02em' }}
            >
              Revision <span style={{ fontStyle: 'italic', fontWeight: 500 }}>checklist.</span>
            </h1>
            <p className="text-stone-600 text-base md:text-lg leading-relaxed max-w-xl">
              Surface-level recall caps you at half marks. Each item below is tagged with the{' '}
              <em>depth</em> Criterion A actually tests. Tap to cycle:{' '}
              <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-stone-100 text-stone-600 text-sm align-middle">
                <span className="w-2 h-2 rounded-full bg-stone-400" /> not yet
              </span>{' '}→{' '}
              <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-100 text-amber-800 text-sm align-middle">
                <AlertTriangle className="w-3 h-3" /> shaky
              </span>{' '}→{' '}
              <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-800 text-sm align-middle">
                <Check className="w-3 h-3" /> got it
              </span>.
            </p>

            <div className="mt-6 flex flex-wrap gap-2">
              {Object.entries(TIER_INFO).map(([key, info]) => {
                const I = info.Icon;
                return (
                  <div key={key} className={`inline-flex items-center gap-2 px-3 py-1.5 rounded-full ${info.bg} ${info.text} border ${info.border} text-xs`}>
                    <I className="w-3.5 h-3.5" />
                    <span className="font-semibold tracking-wider">{info.label}</span>
                    <span className="opacity-70">— {info.desc}</span>
                  </div>
                );
              })}
            </div>
          </header>

          {/* OVERALL PROGRESS */}
          <section className="max-w-3xl mx-auto px-6 mb-8">
            <div className="border border-stone-300 rounded-2xl p-6" style={{ backgroundColor: 'rgba(255, 255, 255, 0.5)' }}>
              <div className="flex items-baseline justify-between mb-3">
                <div className="text-xs tracking-[0.2em] uppercase text-stone-500">Overall</div>
                <div className="flex items-baseline gap-1">
                  <span className="text-4xl font-bold" style={{ fontFamily: "'Fraunces', serif" }}>{pct}</span>
                  <span className="text-stone-500 text-sm">%</span>
                </div>
              </div>

              <div className="relative h-2 bg-stone-200 rounded-full overflow-hidden mb-4">
                <div className="absolute inset-y-0 left-0 bg-emerald-500 transition-all duration-300" style={{ width: `${(stats.counts.done / stats.counts.total) * 100}%` }} />
                <div className="absolute inset-y-0 bg-amber-400 transition-all duration-300" style={{ left: `${(stats.counts.done / stats.counts.total) * 100}%`, width: `${(stats.counts.shaky / stats.counts.total) * 100}%` }} />
              </div>

              <div className="flex flex-wrap gap-x-6 gap-y-2 text-sm">
                <span className="text-emerald-700"><span className="font-semibold">{stats.counts.done}</span> got it</span>
                <span className="text-amber-700"><span className="font-semibold">{stats.counts.shaky}</span> shaky</span>
                <span className="text-stone-600"><span className="font-semibold">{stats.counts.todo}</span> not yet</span>
                <span className="text-stone-400 ml-auto">{stats.counts.total} total</span>
              </div>

              <div className="flex flex-wrap items-center gap-2 mt-5 pt-5 border-t border-stone-200">
                <Filter className="w-4 h-4 text-stone-400" />
                <span className="text-xs uppercase tracking-wider text-stone-500 mr-1">View:</span>
                {[{ id: 'all', label: 'All' }, { id: 'shaky', label: 'Shaky only' }, { id: 'todo', label: 'Not yet' }].map((f) => (
                  <button key={f.id} onClick={() => setFilter(f.id)} className={`px-3 py-1 rounded-full text-xs font-medium transition ${filter === f.id ? 'bg-stone-900 text-white' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>
                    {f.label}
                  </button>
                ))}
                <div className="ml-auto">
                  {resetConfirm === 'all' ? (
                    <button onClick={resetAll} className="text-xs px-3 py-1 rounded-full bg-rose-600 text-white hover:bg-rose-700 transition">
                      Tap to confirm reset
                    </button>
                  ) : (
                    <button onClick={() => { setResetConfirm('all'); setTimeout(() => setResetConfirm((c) => (c === 'all' ? null : c)), 3000); }} className="text-xs px-3 py-1 rounded-full text-stone-500 hover:text-rose-700 hover:bg-rose-50 transition inline-flex items-center gap-1">
                      <RotateCcw className="w-3 h-3" /> Reset all
                    </button>
                  )}
                </div>
              </div>
            </div>
          </section>

          {/* TOPICS */}
          <main className="max-w-3xl mx-auto px-6 space-y-10">
            {TOPICS.map((topic) => {
              const tStats = stats.byTopic[topic.id];
              const tPct = tStats.total > 0 ? Math.round((tStats.done / tStats.total) * 100) : 0;

              return (
                <section key={topic.id} id={topic.id} style={{ scrollMarginTop: '1.5rem' }}>
                  <div className="flex items-end justify-between mb-4 gap-4">
                    <div className="flex-1 min-w-0">
                      <div className="text-[10px] tracking-[0.3em] uppercase font-semibold mb-1" style={{ color: topic.accent.ink }}>Topic</div>
                      <h2 className="text-3xl md:text-4xl font-bold leading-tight" style={{ fontFamily: "'Fraunces', serif", color: topic.accent.ink }}>
                        {topic.name}
                      </h2>
                    </div>
                    <div className="text-right shrink-0">
                      <div className="text-2xl font-bold" style={{ fontFamily: "'Fraunces', serif", color: topic.accent.ink }}>
                        {tStats.done}/{tStats.total}
                      </div>
                      <div className="text-xs text-stone-500">{tPct}%</div>
                    </div>
                  </div>

                  <div className="relative h-1 rounded-full overflow-hidden mb-6" style={{ backgroundColor: topic.accent.tint }}>
                    <div className="absolute inset-y-0 left-0 transition-all duration-300" style={{ width: `${(tStats.done / tStats.total) * 100}%`, backgroundColor: topic.accent.ink }} />
                  </div>

                  <div className="space-y-6">
                    {topic.sections.map((section, si) => {
                      const visibleItems = section.items
                        .map((it, ii) => ({ ...it, key: `${topic.id}:${si}:${ii}` }))
                        .filter((it) => {
                          const s = status[it.key] || 'todo';
                          if (filter === 'shaky') return s === 'shaky';
                          if (filter === 'todo') return s === 'todo';
                          return true;
                        });

                      if (visibleItems.length === 0) return null;

                      return (
                        <div key={si}>
                          <h3 className="font-semibold text-base mb-1" style={{ color: topic.accent.ink }}>{section.name}</h3>
                          {section.note && (
                            <p className="text-xs text-stone-500 italic mb-3 leading-relaxed">{section.note}</p>
                          )}
                          <ul className="space-y-2">
                            {visibleItems.map((item) => {
                              const s = status[item.key] || 'todo';
                              const tier = TIER_INFO[item.tier];
                              return (
                                <li key={item.key}>
                                  <button
                                    onClick={() => toggle(item.key)}
                                    className={`w-full text-left flex items-start gap-3 p-3 rounded-lg border transition group ${
                                      s === 'done'  ? 'bg-emerald-50 border-emerald-200'
                                      : s === 'shaky' ? 'bg-amber-50 border-amber-200'
                                      : 'bg-white/60 border-stone-200 hover:border-stone-300 hover:bg-white'
                                    }`}
                                  >
                                    <span className={`mt-0.5 shrink-0 w-5 h-5 rounded-full flex items-center justify-center border-2 transition ${
                                      s === 'done'  ? 'bg-emerald-500 border-emerald-500 text-white'
                                      : s === 'shaky' ? 'bg-amber-400 border-amber-400 text-white'
                                      : 'border-stone-300 group-hover:border-stone-400'
                                    }`}>
                                      {s === 'done' && <Check className="w-3 h-3" strokeWidth={3} />}
                                      {s === 'shaky' && <AlertTriangle className="w-3 h-3" strokeWidth={3} />}
                                    </span>
                                    <span className="flex-1 min-w-0">
                                      <span className={`block text-sm leading-snug ${s === 'done' ? 'text-emerald-900 line-through opacity-75' : 'text-stone-800'}`}>
                                        {item.text}
                                      </span>
                                    </span>
                                    <span className={`shrink-0 inline-flex items-center gap-1 px-2 py-0.5 rounded-full ${tier.bg} ${tier.text} text-[10px] font-semibold tracking-wider border ${tier.border}`}>
                                      {tier.label}
                                    </span>
                                  </button>
                                </li>
                              );
                            })}
                          </ul>
                        </div>
                      );
                    })}

                    {topic.sections.every((section, si) =>
                      section.items.every((it, ii) => {
                        const s = status[`${topic.id}:${si}:${ii}`] || 'todo';
                        if (filter === 'shaky') return s !== 'shaky';
                        if (filter === 'todo')  return s !== 'todo';
                        return false;
                      })
                    ) && filter !== 'all' && (
                      <p className="text-sm text-stone-400 italic">
                        {filter === 'shaky' ? 'Nothing shaky here — nice.' : 'All covered in this topic.'}
                      </p>
                    )}
                  </div>

                  <div className="mt-4 text-right">
                    {resetConfirm === topic.id ? (
                      <button onClick={() => resetTopic(topic.id)} className="text-xs px-3 py-1 rounded-full bg-rose-600 text-white hover:bg-rose-700 transition">
                        Tap to confirm
                      </button>
                    ) : (
                      <button onClick={() => { setResetConfirm(topic.id); setTimeout(() => setResetConfirm((c) => (c === topic.id ? null : c)), 3000); }} className="text-[11px] text-stone-400 hover:text-rose-600 transition">
                        Reset this topic
                      </button>
                    )}
                  </div>
                </section>
              );
            })}
          </main>

          <footer className="max-w-3xl mx-auto px-6 mt-16 pt-8 border-t border-stone-200">
            <p className="text-xs text-stone-400 leading-relaxed">
              Progress saves automatically to your browser. Close the tab and come back — your checks are still here.
              The night before, switch to <span className="font-semibold text-stone-600">Shaky only</span> and grind those.
            </p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RevisionChecklist />);
  </script>
</body>
</html>
